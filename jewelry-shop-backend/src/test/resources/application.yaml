spring:
  datasource:
    url: jdbc:h2:mem:jewelry_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: false
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-test-secret-key-123456
    expiration: 86400000
